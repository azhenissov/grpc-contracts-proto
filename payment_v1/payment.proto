syntax = "proto3";

package payment_v1;

option go_package = "github.com/azhenissov/grpc-contracts-go/payment_v1";

message ProcessPaymentRequest {
  int64 order_id = 1;
  double amount = 2;
}

message ProcessPaymentResponse {
  bool success = 1;
  string transaction_id = 2;
}

service PaymentAPI {
  //
  rpc ProcessPayment (ProcessPaymentRequest) returns (ProcessPaymentResponse);
}